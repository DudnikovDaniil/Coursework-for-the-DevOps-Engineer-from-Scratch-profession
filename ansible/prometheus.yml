---
- name: Install and configure Prometheus
  hosts: prometheus
  become: yes
  vars:
    prometheus_version: "2.45.0"
    prometheus_user: "prometheus"
    prometheus_group: "prometheus"
    prometheus_dir: "/etc/prometheus"
    prometheus_data_dir: "/var/lib/prometheus"
    web1_ip: "10.10.2.24"
    web2_ip: "10.20.2.32"

  tasks:
    - name: Create prometheus user
      user:
        name: "{{ prometheus_user }}"
        system: yes
        shell: /bin/false
        create_home: no

    - name: Create prometheus directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        mode: 0755
      loop:
        - "{{ prometheus_dir }}"
        - "{{ prometheus_data_dir }}"
        - "{{ prometheus_dir }}/rules"
        - "{{ prometheus_dir }}/file_sd"

    - name: Download Prometheus
      get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
        dest: "/tmp/prometheus.tar.gz"

    - name: Extract Prometheus
      unarchive:
        src: "/tmp/prometheus.tar.gz"
        dest: "/tmp"
        remote_src: yes
        creates: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64"

    - name: Install Prometheus binaries
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: 0755
        remote_src: yes
      loop:
        - prometheus
        - promtool

    - name: Copy prometheus.yml configuration
      template:
        src: prometheus.yml.j2
        dest: "{{ prometheus_dir }}/prometheus.yml"
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        mode: 0644

    - name: Copy console files
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "{{ prometheus_dir }}/{{ item }}"
        remote_src: yes
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        mode: 0644
      loop:
        - console_libraries
        - consoles

    - name: Create Prometheus systemd service
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User={{ prometheus_user }}
          Group={{ prometheus_group }}
          Type=simple
          ExecStart=/usr/local/bin/prometheus \
            --config.file={{ prometheus_dir }}/prometheus.yml \
            --storage.tsdb.path={{ prometheus_data_dir }} \
            --web.console.templates={{ prometheus_dir }}/consoles \
            --web.console.libraries={{ prometheus_dir }}/console_libraries \
            --web.listen-address=0.0.0.0:9090 \
            --web.external-url=

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable Prometheus
      systemd:
        name: prometheus
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Clean up temporary files
      file:
        path: "/tmp/prometheus.tar.gz"
        state: absent

    - name: Wait for Prometheus to start
      wait_for:
        port: 9090
        host: "{{ ansible_default_ipv4.address }}"
        delay: 5
        timeout: 30

    - name: Check Prometheus targets
      uri:
        url: "http://{{ ansible_default_ipv4.address }}:9090/api/v1/targets"
        method: GET
      register: prometheus_targets
      ignore_errors: yes

    - name: Show Prometheus targets status
      debug:
        msg: "Prometheus is running with {{ prometheus_targets.json.data.activeTargets | length }} active targets"
      when: prometheus_targets is success
